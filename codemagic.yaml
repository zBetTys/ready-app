workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Precache iOS
        script: |
          flutter precache --ios

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --debug --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa