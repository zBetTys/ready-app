workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build ios --release --no-codesign
      - xcodebuild -exportArchive \
        -archivePath build/ios/archive/Runner.xcarchive \
        -exportPath build/ios/ipa \
        -exportOptionsPlist ios/Runner/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
